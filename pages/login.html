
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login | Tower & Rigging</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("../assets/images/bg.jpg") center/cover no-repeat;
}

.login-card{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
width:350px;
}

.login-card h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#084298;
}

.back-link{
text-align:center;
margin-top:15px;
}

.back-link a{
text-decoration:none;
color:#0d6efd;
font-weight:500;
}

.back-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-card">

<h2>Login</h2>

<form onsubmit="loginUser(event)" autocomplete="off">

<!-- hidden dummy inputs to stop autofill -->
<input type="text" style="display:none">
<input type="password" style="display:none">

<input type="email" id="email" placeholder="Email" autocomplete="off" required>

<input type="password" id="password" placeholder="Password" autocomplete="new-password" required>

<button type="submit">Login</button>

</form>

<!-- BACK TO WEBSITE -->

<div class="back-link">
<a href="/pages/index.html">← Back to Website</a>
</div>

</div>

<script>

window.onload = function(){
document.getElementById("email").value="";
document.getElementById("password").value="";
}

function loginUser(event){

event.preventDefault();

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email==="admin@gmail.com" && password==="admin123"){

sessionStorage.setItem("role","admin");
window.location.href="../admin/dashboard.html";

}

else if(email==="user@gmail.com" && password==="user123"){

sessionStorage.setItem("role","user");
window.location.href="../user/dashboard.html";

}

else{

alert("Invalid login");

}

}

</script>

</body>
</html>
