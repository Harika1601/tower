<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login | Tower & Rigging</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("../assets/images/bg.jpg") center/cover no-repeat;
}

.login-card{
width:360px;
padding:35px;
border-radius:12px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

.login-card h2{
margin-bottom:20px;
}

button{
width:100%;
padding:10px;
background:#dc3545;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#bb2d3b;
}

/* Back button style */
.back-btn{
margin-top:10px;
}
</style>

</head>

<body>

<div class="login-card">

<h2>Admin Login</h2>

<form onsubmit="adminLogin(event)">

<input type="email" id="email" class="form-control mb-3" placeholder="Admin Email" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p class="mt-3">
User? <a href="user-login.html">Login here</a>
</p>

<!-- ✅ BACK TO WEBSITE BUTTON -->
<div class="back-btn">
<a href="/pages/index.html" class="btn btn-outline-dark w-100">
<i class="bi bi-arrow-left"></i> Back to Website
</a>
</div>

</div>

<script>
function adminLogin(e){
e.preventDefault();

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

// CLEAR OLD SESSION
sessionStorage.clear();

// CHECK ADMIN
if(email === "admin@gmail.com" && password === "admin123"){

sessionStorage.setItem("role","admin");
window.location.href = "../admin/dashboard.html";

}else{
alert("Invalid Admin Credentials");
}
}
</script>

</body>
</html>
