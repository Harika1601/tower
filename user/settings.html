
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Account Settings | Tower & Rigging</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* GENERAL */

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("../assets/images/bg.jpg") center/cover no-repeat;
background-attachment:fixed;
}

/* SIDEBAR */

.sidebar{
height:100vh;
width:240px;
background:#0d6efd;
color:white;
position:fixed;
padding:20px;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.sidebar a:hover{
background:white;
color:#0d6efd;
}

/* MAIN CONTENT */

.main{
margin-left:260px;
padding:30px;
}

/* HEADER */

.header{
background:rgba(255,255,255,0.95);
padding:15px 25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* SETTINGS CARD */

.settings-card{
background:rgba(255,255,255,0.96);
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-control{
margin-bottom:15px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>User Panel</h3>

<a href="dashboard.html">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="orders.html">
<i class="bi bi-calendar-check"></i> My Bookings
</a>

<a href="saved-items.html">
<i class="bi bi-bookmark"></i> Saved Items
</a>

<a href="messages.html">
<i class="bi bi-chat-dots"></i> Messages
</a>

<a href="profile.html">
<i class="bi bi-person"></i> Profile
</a>

<a href="settings.html">
<i class="bi bi-gear"></i> Settings
</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- HEADER -->

<div class="header">

<h4>Account Settings</h4>
<small class="text-muted">Manage your account security and preferences</small>

</div>

<!-- SETTINGS SECTION -->

<div class="settings-card">

<h5 class="mb-3">Change Password</h5>

<form>

<input type="password" class="form-control" placeholder="Current Password">

<input type="password" class="form-control" placeholder="New Password">

<input type="password" class="form-control" placeholder="Confirm New Password">

<button class="btn btn-primary mt-2">
<i class="bi bi-save"></i> Update Password
</button>

</form>

<hr class="my-4">

<h5 class="mb-3">Notification Preferences</h5>

<div class="form-check">
<input class="form-check-input" type="checkbox" checked>
<label class="form-check-label">
Email notifications for bookings
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" checked>
<label class="form-check-label">
Project status updates
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Marketing updates
</label>
</div>

<button class="btn btn-success mt-3">
Save Preferences
</button>

</div>

</div>

</body>

</html>
