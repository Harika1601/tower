
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>User Profile | Tower & Rigging</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* GENERAL */

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("../assets/images/bg.jpg") center/cover no-repeat;
background-attachment:fixed;
}

/* SIDEBAR */

.sidebar{
height:100vh;
width:240px;
background:#0d6efd;
color:white;
position:fixed;
padding:20px;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.sidebar a:hover{
background:white;
color:#0d6efd;
}

/* MAIN CONTENT */

.main{
margin-left:260px;
padding:30px;
}

/* HEADER */

.header{
background:rgba(255,255,255,0.95);
padding:15px 25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* PROFILE CARD */

.profile-card{
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* PROFILE IMAGE */

.profile-img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

/* FORM */

.form-control{
margin-bottom:15px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>User Panel</h3>

<a href="dashboard.html">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="orders.html">
<i class="bi bi-calendar-check"></i> My Bookings
</a>

<a href="saved-items.html">
<i class="bi bi-bookmark"></i> Saved Items
</a>

<a href="messages.html">
<i class="bi bi-chat-dots"></i> Messages
</a>

<a href="profile.html">
<i class="bi bi-person"></i> Profile
</a>

<a href="settings.html">
<i class="bi bi-gear"></i> Settings
</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- HEADER -->

<div class="header">

<h4>User Profile</h4>
<small class="text-muted">Manage your account information</small>

</div>

<!-- PROFILE SECTION -->

<div class="profile-card">

<div class="row">

<!-- PROFILE INFO -->

<div class="col-md-4 text-center">

<img src="../assets/images/user.jpg" class="profile-img">

<h5>John Carter</h5>
<p class="text-muted">Client Account</p>

<p><i class="bi bi-envelope"></i> john@email.com</p>
<p><i class="bi bi-geo-alt"></i> Hyderabad, India</p>

</div>

<!-- PROFILE FORM -->

<div class="col-md-8">

<h5 class="mb-3">Edit Profile</h5>

<form>

<input type="text" class="form-control" value="John Carter">

<input type="email" class="form-control" value="john@email.com">

<input type="text" class="form-control" value="Hyderabad">

<input type="password" class="form-control" placeholder="Change Password">

<button class="btn btn-primary mt-2">
<i class="bi bi-save"></i> Update Profile
</button>

</form>

</div>

</div>

</div>

</div>
